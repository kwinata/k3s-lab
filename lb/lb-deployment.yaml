apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-lb-deployment
  labels:
    app: go-lb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-lb
  template:
    metadata:
      labels:
        app: go-lb
    spec:
      containers:
        - name: go-lb
          image: go-lb:latest
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8080